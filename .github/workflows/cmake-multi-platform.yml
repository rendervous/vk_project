name: Build wheels

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # Python + cibuildwheel
      # ----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      # ----------------------------------------------------------------------
      # Linux Vulkan dependencies (inside manylinux container)
      # ----------------------------------------------------------------------
      - name: Build wheels
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *musllinux*"

          # IMPORTANT: Vulkan headers for Linux builds
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y vulkan-loader-devel vulkan-headers || true

          # IMPORTANT: Windows Vulkan SDK install + environment setup
          CIBW_BEFORE_ALL_WINDOWS: >
            choco install vulkan-sdk -y &&
            for /d %%D in (C:\VulkanSDK\*) do set VULKAN_SDK=%%D &&
            echo VULKAN_SDK=%VULKAN_SDK%

          # IMPORTANT: Vulkan SDK is 64-bit only
          CIBW_ARCHS_WINDOWS: AMD64

        run: python -m cibuildwheel --output-dir wheelhouse

      # ----------------------------------------------------------------------
      # Upload artifacts
      # ----------------------------------------------------------------------
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl