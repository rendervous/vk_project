name: Build wheels

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # Python + cibuildwheel
      # ----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      # ----------------------------------------------------------------------
      # Linux Vulkan (inside manylinux container)
      # ----------------------------------------------------------------------
      - name: Build wheels
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *musllinux*"

          CIBW_ARCHS_WINDOWS: AMD64

          # Linux dependencies
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y vulkan-loader-devel vulkan-headers || true

        run: python -m cibuildwheel --output-dir wheelhouse

      # ----------------------------------------------------------------------
      # Windows Vulkan SDK (REQUIRED FIX)
      # ----------------------------------------------------------------------
      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install vulkan-sdk -y

          $sdk = Get-ChildItem "C:\VulkanSDK" |
                 Sort-Object Name -Descending |
                 Select-Object -First 1

          echo "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "CMAKE_PREFIX_PATH=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "VULKAN_SDK=$($sdk.FullName)"

      # ----------------------------------------------------------------------
      # Upload wheels
      # ----------------------------------------------------------------------
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl