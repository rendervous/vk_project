name: Build wheels

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Locate Vulkan SDK on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdkRoot = Get-ChildItem 'C:\VulkanSDK' -Directory |
            Sort-Object Name -Descending |
            Select-Object -First 1

          if (-not $sdkRoot) {
            throw "Vulkan SDK not found under C:\VulkanSDK"
          }

          "VULKAN_SDK=$($sdkRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CMAKE_PREFIX_PATH=$($sdkRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      # ----------------------------------------------------------------------
      # Linux Vulkan (inside manylinux container)
      # ----------------------------------------------------------------------
      - name: Build wheels
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *musllinux*"

          CIBW_ARCHS_WINDOWS: AMD64

          # Linux Vulkan
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y vulkan-loader-devel vulkan-headers || true

          CIBW_ENVIRONMENT_WINDOWS: |
            VULKAN_SDK=%VULKAN_SDK%
            CMAKE_PREFIX_PATH=%CMAKE_PREFIX_PATH%

        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl