name: Build wheels

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Vulkan SDK on Windows
        if: runner.os == 'Windows'
        id: vulkan
        uses: TWoolhouse/setup-vulkan-sdk@v1.1.0
        with:
          version: latest

      - name: Export Vulkan SDK paths on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "VULKAN_SDK=${{ steps.vulkan.outputs.path }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "Vulkan_ROOT=${{ steps.vulkan.outputs.path }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CMAKE_PREFIX_PATH=${{ steps.vulkan.outputs.path }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      # ----------------------------------------------------------------------
      # Linux Vulkan (inside manylinux container)
      # ----------------------------------------------------------------------
      - name: Build wheels
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *musllinux*"

          CIBW_ARCHS_WINDOWS: AMD64

          # Linux Vulkan
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y vulkan-loader-devel vulkan-headers || true

        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl