name: Build and Publish wheels

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Installed directly from LunarG (not the TWoolhouse/setup-vulkan-sdk
      # action): that action's "latest"/version handling isn't reliable here
      # -- pinning its `version:` input still produced a much newer SDK
      # whose Vulkan-Hpp moved DispatchLoaderDynamic into vk::detail, which
      # this codebase isn't compatible with. 1.3.283.0 (not 1.3.275.0: no
      # longer hosted by LunarG) matches the version the Linux job already
      # gets via yum, and is confirmed to still expose vk::DispatchLoaderDynamic.
      - name: Set up Vulkan SDK on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "1.3.283.0"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK-Installer.exe
          Start-Process -FilePath .\VulkanSDK-Installer.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait -NoNewWindow
          $sdkPath = "C:\VulkanSDK\$ver"
          "VULKAN_SDK=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "Vulkan_ROOT=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CMAKE_PREFIX_PATH=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      # ----------------------------------------------------------------------
      # Linux Vulkan (inside manylinux container)
      # ----------------------------------------------------------------------
      - name: Build wheels
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "pp* *musllinux*"

          CIBW_ARCHS_WINDOWS: AMD64

          # Linux Vulkan + GLFW/X11 dev headers
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y vulkan-loader-devel vulkan-headers
            libX11-devel libXrandr-devel libXinerama-devel libXcursor-devel libXi-devel libXext-devel || true

        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build_wheels
    # if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist